# Azure DICOM Service Emulator — minimal stack
#
# Runs the emulator + PostgreSQL. No Azurite, no event publishing.
# This is the recommended starting point.
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8080/health
#   open http://localhost:8080/docs
#
# For the full stack (+ Azurite event publishing):
#   docker compose -f docker-compose.full.yml up -d
#
# For external PostgreSQL (no bundled postgres):
#   See docker-compose.external-db.yml

# ⚠️  Default credentials below are for LOCAL DEVELOPMENT ONLY.

services:
  emulator:
    image: rhavekost/azure-dicom-service-emulator:latest
    # Build from source instead:
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://emulator:emulator@postgres:5432/dicom_emulator
      DICOM_STORAGE_DIR: /data/dicom
      EXPIRY_INTERVAL_SECONDS: 3600
      # EVENT_PROVIDERS: not set — no event publishing (add to enable)
      #
      # ── Uvicorn tuning ────────────────────────────────────────────
      # Override these to scale workers and connection limits without
      # rebuilding the image.  Defaults baked into the Dockerfile match
      # the values listed below.
      UVICORN_WORKERS: 4
      UVICORN_KEEPALIVE: 75
      UVICORN_GRACEFUL_SHUTDOWN: 60
      UVICORN_LIMIT_CONCURRENCY: 200
      UVICORN_H11_MAX: 16384
      #
      # ── Parse-pool sizing ─────────────────────────────────────────
      # With UVICORN_WORKERS > 1 each worker spawns its own
      # ProcessPoolExecutor, so total parse subprocesses is
      # WORKERS * DICOM_PARSE_WORKERS.  Set DICOM_PARSE_WORKERS=0 to
      # fall back to the default thread executor (useful on small
      # boxes where per-process import cost dominates).
      # DICOM_PARSE_WORKERS: 4
      # DICOM_PARSE_INFLIGHT: 8
      #
      # ── Database connection pool ──────────────────────────────────
      # DB_POOL_SIZE: 20
      # DB_MAX_OVERFLOW: 20
      # DB_POOL_TIMEOUT_SECONDS: 30
      # DB_POOL_RECYCLE_SECONDS: 1800
    volumes:
      - dicom-data:/data/dicom
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # cover spawn-pool warm-up across N workers

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: emulator
      POSTGRES_PASSWORD: emulator
      POSTGRES_DB: dicom_emulator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emulator -d dicom_emulator"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  dicom-data:
