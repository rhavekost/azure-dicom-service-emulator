name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_dicom
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run linting
        run: ruff check app/ tests/

      - name: Run type checking
        run: mypy app/

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v -m unit \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit-unit.xml

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_dicom
        run: |
          pytest tests/integration/ -v -m integration \
            --cov=app --cov-append \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit-integration.xml

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_dicom
        run: |
          pytest tests/e2e/ -v -m e2e \
            --no-cov \
            --junitxml=junit-e2e.xml || [ $? -eq 5 ]

      - name: Check coverage threshold
        run: |
          # Python 3.12/3.13 sys.monitoring does not trace async/await continuations,
          # so measured coverage is lower than actual (~85%+). The threshold is set to
          # match what 3.12/3.13 can measure; Python 3.14 is the authoritative gate.
          # Threshold lowered from 75% → 72% after adding new async QIDO/bulk-update
          # endpoints (Gap 1 and Gap 4a) whose bodies are not traced on 3.12/3.13.
          if [[ "${{ matrix.python-version }}" == "3.14" ]]; then
            coverage report --fail-under=85
          else
            coverage report --fail-under=72
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit-*.xml

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          pytest tests/performance/ --benchmark-only \
            --benchmark-json=benchmark-results.json || [ $? -eq 5 ]

      - name: Upload benchmark results
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: benchmark-results
          path: benchmark-results.json
