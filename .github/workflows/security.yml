name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2 # v5.3.0
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit scan
        run: |
          bandit -r app/ -c bandit.yaml -ll -f json -o bandit-report.json || true
          bandit -r app/ -c bandit.yaml -ll -f screen

      - name: Upload Bandit report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec # v4.6.1
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check for HIGH severity issues
        run: |
          if bandit -r app/ -c bandit.yaml -lll -f screen | grep -q ">> Issue"; then
            echo "HIGH severity security issues found!"
            exit 1
          fi

  safety:
    name: Safety Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2 # v5.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Safety check
        run: uv run safety check --json --output safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec # v4.6.1
        if: always()
        with:
          name: safety-report
          path: safety-report.json
