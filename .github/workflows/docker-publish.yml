name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af68 # v4.2.2

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3 # SHA-pin TODO

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # SHA-pin TODO

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # SHA-pin TODO
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5 # SHA-pin TODO
        with:
          images: rhavekost/azure-dicom-service-emulator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/tags/{0}', github.ref_name) }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5 # SHA-pin TODO
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@e98e4d1628a5f3be2be7c231e50981aee98723ae # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: rhavekost/azure-dicom-service-emulator
          short-description: "Local emulator for Azure Health Data Services DICOM Service. Like Azurite, but for DICOM."
          readme-filepath: ./DOCKER_HUB_OVERVIEW.md
